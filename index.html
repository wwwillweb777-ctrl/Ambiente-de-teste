<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat de Atendimento</title>

    <!-- ✅ 1º CARREGA O FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <!-- ✅ 2º CARREGA AS CHAVES (config.js) ANTES DE TUDO -->
    <script src="config.js"></script>

    <!-- ✅ 3º INICIALIZA FIREBASE E CRIA TODAS AS FUNÇÕES LOGO NO INÍCIO -->
    <script>
        // ✅ TUDO AQUI É CRIADO ANTES DO RESTO DO CÓDIGO
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const banco = firebase.database();
        let usuarioAtual = null;
        let emailsBloqueados = [];

        // ✅ FUNÇÃO DE LOGIN CRIADA AQUI, JÁ CARREGADA
        function loginComGoogle() {
            const provedor = new firebase.auth.GoogleAuthProvider();
            provedor.setCustomParameters({ prompt: 'select_account' });

            auth.signInWithPopup(provedor)
            .then(result => {
                const usuario = result.user;
                if (usuario.email === EMAIL_PERMITIDO) {
                    usuarioAtual = usuario;
                    localStorage.setItem('perfil_cliente', JSON.stringify({
                        nome: usuario.displayName,
                        email: usuario.email,
                        id: usuario.uid
                    }));
                    fecharModalLogin();
                    document.getElementById('avisoVitoria').style.display = 'block';
                } else {
                    document.getElementById('avisoNegado').style.display = 'block';
                    auth.signOut();
                    setTimeout(() => document.getElementById('avisoNegado').style.display = 'none', 3000);
                }
            })
            .catch(erro => {
                if (erro.code !== 'auth/cancelled-popup-request' && erro.code !== 'auth/popup-closed-by-user') {
                    alert("❌ Erro: " + erro.message);
                }
            });
        }

        // ✅ DEMAIS FUNÇÕES TAMBÉM CRIADAS AQUI
        function fecharModalLogin() { document.getElementById('modalLogin').style.display = 'none'; }
        function abrirModalLogin() { document.getElementById('modalLogin').style.display = 'flex'; }
        function deslogar() {
            auth.signOut().then(() => {
                usuarioAtual = null;
                localStorage.removeItem('perfil_cliente');
                document.getElementById('avisoVitoria').style.display = 'none';
                document.getElementById('botao-sair').style.display = 'none';
                alert("🔌 Desconectado");
                abrirModalLogin();
            });
        }
        function irParaPaginaOrigem() { window.location.href = 'index.html'; }
        function carregarEmailsBloqueados() {
            const dados = localStorage.getItem('emails_bloqueados');
            emailsBloqueados = dados ? JSON.parse(dados) : [];
        }
        function bloquearEmail(email, nome) {
            if (!emailsBloqueados.some(b => b.email === email)) {
                emailsBloqueados.push({ email, nome, data: new Date().toLocaleString() });
                localStorage.setItem('emails_bloqueados', JSON.stringify(emailsBloqueados));
                alert(`✅ Bloqueado: ${email}`);
            }
        }
        function verificarSeEstaBloqueado(email) { return emailsBloqueados.some(b => b.email === email); }
    </script>

    <!-- ✅ RESTO DO CÓDIGO SÓ DEPOIS DE TUDO CRIADO -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { line-height: 1.6; background-color: #f9fafb; color: #1f2937; padding-top: 75px; overflow-x: hidden; }

        .aviso-vitoria {
            background-color: #28a745;
            color: white;
            padding: 12px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 9999999;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .aviso-negado {
            background-color: #dc2626;
            color: white;
            padding: 12px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 9999999;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .cabecalho {
            position: fixed !important;
            top: 36px !important;
            left: 0 !important;
            right: 0 !important;
            width: 100% !important;
            height: 75px !important;
            background-color: #7c3aed !important;
            color: white !important;
            padding: 10px 16px !important;
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            z-index: 999999 !important;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15) !important;
        }

        #botao-voltar {
            background-color: #dc2626 !important;
            color: #ffffff !important;
            font-weight: bold !important;
            font-size: 12px !important;
            border: none !important;
            border-radius: 8px !important;
            padding: 4px 8px !important;
            cursor: pointer !important;
        }

        #botao-sair {
            background-color: #f3f4f6 !important;
            color: #dc2626 !important;
            border: none;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            font-weight: 600;
        }

        .modal-login {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999999;
        }
        .modal-conteudo {
            background: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            width: 85%;
            max-width: 320px;
        }
        .botao-google {
            background: white;
            color: #444;
            border: 1px solid #ddd;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
            width: 100%;
            justify-content: center;
        }
        .botao-google img { width: 20px; height: 20px; }

        #mensagens {
            width: 100%;
            height: calc(100vh - 210px);
            overflow-y: auto;
            padding: 16px;
            background-color: #f9fafb;
            margin-top: 36px;
        }

        .barra-entrada {
            position: fixed;
            bottom: 15px;
            left: 16px;
            right: 16px;
            width: calc(100% - 32px);
        }

        #texto_msg {
            width: 100%;
            height: 50px;
            border-radius: 9999px;
            border: 2px solid #7c3aed;
            padding: 0 60px 0 20px;
            font-size: 16px;
        }

        #botao-enviar {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            width: 42px;
            height: 42px;
            background-color: #dc2626;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
        }

        .mensagem {
            margin-bottom: 12px;
            max-width: 78%;
            padding: 14px;
            border-radius: 12px;
            background-color: #f3f4f6;
            margin-left: auto;
            border-bottom-right-radius: 0;
        }
        .mensagem-admin {
            background-color: #ede9fe;
            margin-left: 0;
            border-bottom-left-radius: 0;
        }
    </style>
</head>
<body>

    <div id="avisoVitoria" class="aviso-vitoria" style="display: none;">
        ✅ VOCÊ CONSEGUIU ENTRAR → VOCÊ GANHOU! 🎉
    </div>

    <div id="avisoNegado" class="aviso-negado" style="display: none;">
        ❌ ACESSO NEGADO - E-MAIL NÃO AUTORIZADO
    </div>

    <div class="cabecalho">
        <button id="botao-voltar" onclick="irParaPaginaOrigem()">
            <i class="fa fa-arrow-left mr-1"></i> Voltar
        </button>
        <div class="text-center flex-1 px-2">
            <p id="info-pedido" class="text-sm font-medium">Conversa geral</p>
            <p id="nome-responsavel-chat" class="text-xs opacity-90"></p>
        </div>
        <div>
            <button id="botao-sair" onclick="deslogar()" style="display:none;">
                <i class="fa fa-sign-out"></i> Sair
            </button>
        </div>
    </div>

    <div id="mensagens">
        <div class="text-center text-gray-500 text-sm mt-4">Inicie uma conversa!</div>
    </div>

    <div class="barra-entrada">
        <input type="text" id="texto_msg" placeholder="Digite 'oi' ou qualquer coisa...">
        <button id="botao-enviar" onclick="verificarEEnviar()">
            <i class="fa fa-paper-plane"></i>
        </button>
    </div>

    <div id="modalLogin" class="modal-login">
        <div class="modal-conteudo">
            <h3 class="text-lg font-bold text-purple-700 mb-2">Conectar com o Google</h3>
            <p class="text-sm text-gray-600 mb-3">Apenas um e-mail autorizado pode entrar</p>
            <!-- ✅ A FUNÇÃO loginComGoogle JÁ EXISTE ANTES DESSE BOTÃO -->
            <button class="botao-google" onclick="loginComGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Escolher Conta Google
            </button>
            <button onclick="fecharModalLogin()" class="mt-4 text-sm text-gray-500">Cancelar</button>
        </div>
    </div>

    <script>
        // ✅ O RESTO SÓ VEM DEPOIS, TUDO JÁ CARREGADO
        const urlParams = new URLSearchParams(window.location.search);
        const tipoUsuario = urlParams.get('tipo') || 'cliente';
        const pedidoId = urlParams.get('pedido') || null;
        let nomeQuemEnvia = '';
        let emailQuemEnvia = '';
        const containerMsg = document.getElementById('mensagens');

        document.addEventListener('DOMContentLoaded', () => {
            carregarEmailsBloqueados();
            const perfil = localStorage.getItem('perfil_cliente');
            if (perfil) {
                const dados = JSON.parse(perfil);
                if (dados.email === EMAIL_PERMITIDO) {
                    usuarioAtual = dados;
                    nomeQuemEnvia = dados.nome;
                    emailQuemEnvia = dados.email;
                    document.getElementById('nome-responsavel-chat').innerText = "Logado: " + nomeQuemEnvia;
                    document.getElementById('botao-sair').style.display = 'block';
                    fecharModalLogin();
                } else {
                    localStorage.removeItem('perfil_cliente');
                    abrirModalLogin();
                }
            } else {
                abrirModalLogin();
            }

            banco.ref(pedidoId ? `mensagens/${pedidoId}` : 'mensagens/geral').on('value', carregarMensagens);
        });

        function verificarEEnviar() {
            if (!usuarioAtual) return abrirModalLogin();
            if (verificarSeEstaBloqueado(emailQuemEnvia)) return alert("❌ Bloqueado");
            enviarMensagem();
        }

        function enviarMensagem() {
            const texto = document.getElementById('texto_msg').value.trim();
            if (!texto || !nomeQuemEnvia) return;
            const mensagem = {
                texto: texto,
                remetente: tipoUsuario,
                nome_remetente: nomeQuemEnvia,
                email_remetente: emailQuemEnvia,
                data: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
            };
            banco.ref(pedidoId ? `mensagens/${pedidoId}` : 'mensagens/geral').once('value', s => {
                const todas = s.val() || [];
                todas.push(mensagem);
                banco.ref(pedidoId ? `mensagens/${pedidoId}` : 'mensagens/geral').set(todas);
            });
            document.getElementById('texto_msg').value = '';
        }

        function carregarMensagens(snapshot) {
            const mensagens = snapshot.val() || [];
            let filtro = mensagens;
            if (tipoUsuario === 'cliente' && usuarioAtual) {
                filtro = mensagens.filter(m => m.email_remetente === usuarioAtual.email || m.remetente !== 'cliente');
            }
            if (filtro.length === 0) return containerMsg.innerHTML = '<div class="text-center text-gray-500 text-sm mt-4">Nenhuma mensagem</div>';

            let html = '';
            filtro.forEach(m => {
                const classe = (m.remetente === 'admin' || m.remetente === 'atendente') ? 'mensagem-admin' : '';
                html += `
                <div class="mensagem ${classe}">
                    <div class="nome-msg">${m.nome_remetente}<div class="email-msg">${m.email_remetente}</div></div>
                    <div>${m.texto}</div>
                    <div class="hora-msg">${m.data}</div>
                </div>`;
            });
            containerMsg.innerHTML = html;
            containerMsg.scrollTop = containerMsg.scrollHeight;
        }
    </script>

</body>
</html>
