<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat GitHub Pages</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAsrFAwToc89j32XX0juvW7C7VYgpGcdiE",
          authDomain: "ambiente-de-teste-b966a.firebaseapp.com",
          databaseURL: "https://ambiente-de-teste-b966a-default-rtdb.firebaseio.com",
          projectId: "ambiente-de-teste-b966a",
          storageBucket: "ambiente-de-teste-b966a.firebasestorage.app",
          messagingSenderId: "878588656595",
          appId: "1:878588656595:web:46596b60a49e840f4a8d26"
        };

        const EMAIL_PERMITIDO = "williamempreiteiro007@gmail.com";
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const banco = firebase.database();
        let usuarioAtual = null;

        function loginComGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            auth.signInWithRedirect(provider);
        }

        function verificarRetorno() {
            auth.getRedirectResult().then(result => {
                if (result.user) {
                    if (result.user.email === EMAIL_PERMITIDO) {
                        usuarioAtual = result.user;
                        // ✨ SOMIR A TELA DE LOGIN DE VEZ ✨
                        document.getElementById('telaLogin').style.display = 'none';
                        document.getElementById('telaChat').style.display = 'block';
                        banco.ref('mensagens/geral').on('value', carregarMensagens);
                    } else {
                        auth.signOut();
                        alert("❌ CONTA NÃO PERMITIDA");
                    }
                }
            }).catch(() => {});
        }

        function verificarSessao() {
            auth.onAuthStateChanged(user => {
                if (user && user.email === EMAIL_PERMITIDO) {
                    usuarioAtual = user;
                    document.getElementById('telaLogin').style.display = 'none';
                    document.getElementById('telaChat').style.display = 'block';
                    banco.ref('mensagens/geral').on('value', carregarMensagens);
                } else {
                    usuarioAtual = null;
                    document.getElementById('telaLogin').style.display = 'flex';
                    document.getElementById('telaChat').style.display = 'none';
                }
            });
        }

        function deslogar() {
            auth.signOut().then(() => {
                usuarioAtual = null;
                location.reload();
            });
        }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { overflow: hidden; }

        /* ✨ TELA DE LOGIN: SÓ APARECE SE NÃO ESTIVER LOGADO ✨ */
        #telaLogin {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #fff;
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }

        .caixa-login {
            text-align: center;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px #00000020;
        }

        .botao-google {
            background: white; color: #333; border: 1px solid #ddd;
            padding: 14px 20px; border-radius: 8px; width: 260px;
            display: flex; align-items: center; justify-content: center;
            gap: 10px; margin-top: 20px; cursor: pointer;
            font-size: 16px;
        }

        /* ✨ TELA DO CHAT: TELA INTEIRA ✨ */
        #telaChat {
            display: none;
            width: 100vw; height: 100vh;
            background: #f5f5f5;
            position: relative;
        }

        .cabecalho {
            height: 60px; background: #6f42c1; color: white;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
        }

        #mensagens {
            height: calc(100vh - 120px); overflow-y: auto;
            padding: 20px;
        }

        .barra-entrada {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 60px; background: white;
            display: flex; align-items: center; padding: 0 15px;
            border-top: 1px solid #ddd;
        }

        #texto_msg {
            flex: 1; height: 40px; border: 1px solid #6f42c1;
            border-radius: 20px; padding: 0 15px; font-size: 15px;
            margin-right: 10px;
        }

        #botao-enviar {
            width: 40px; height: 40px; background: #dc3545; color: white;
            border: none; border-radius: 50%; cursor: pointer;
        }

        .mensagem {
            margin: 8px 0; padding: 12px 16px; border-radius: 10px;
            max-width: 75%;
        }
        .minha { background: #ede9fe; margin-left: auto; border-bottom-right-radius: 0; }
        .outra { background: #e9ecef; margin-right: auto; border-bottom-left-radius: 0; }
    </style>
</head>
<body>

    <!-- ✨ TELA DE LOGIN ✨ -->
    <div id="telaLogin">
        <div class="caixa-login">
            <h1 style="color:#6f42c1; font-size:22px;">🔐 Acesso Autorizado</h1>
            <p style="color:#666; margin-top:10px;">Apenas o e-mail cadastrado pode entrar</p>
            <button class="botao-google" onclick="loginComGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22">
                Entrar com Google
            </button>
        </div>
    </div>

    <!-- ✨ TELA DO CHAT ✨ -->
    <div id="telaChat">
        <div class="cabecalho">
            <h2 style="font-size:18px;">Chat GitHub Pages</h2>
            <button onclick="deslogar()" style="background:white; color:#dc3545; border:none; padding:6px 12px; border-radius:6px;">Sair</button>
        </div>

        <div id="mensagens"></div>

        <div class="barra-entrada">
            <input type="text" id="texto_msg" placeholder="Digite sua mensagem..." onkeydown="if(event.key==='Enter') enviar()">
            <button id="botao-enviar" onclick="enviar()">➡️</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            verificarRetorno();
            verificarSessao();
        });

        function enviar() {
            const texto = document.getElementById('texto_msg').value.trim();
            if (!texto || !usuarioAtual) return;

            const msg = {
                texto: texto,
                remetente: EMAIL_PERMITIDO,
                hora: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})
            };

            banco.ref('mensagens/geral').once('value', s => {
                const todas = s.val() || [];
                todas.push(msg);
                banco.ref('mensagens/geral').set(todas);
            });

            document.getElementById('texto_msg').value = '';
        }

        function carregarMensagens(snapshot) {
            const dados = snapshot.val() || [];
            let html = '';

            dados.forEach(m => {
                const classe = m.remetente === EMAIL_PERMITIDO ? 'minha' : 'outra';
                html += `<div class="mensagem ${classe}">${m.texto}<div style="font-size:11px; margin-top:4px; opacity:0.7;">${m.hora}</div></div>`;
            });

            document.getElementById('mensagens').innerHTML = html;
            document.getElementById('mensagens').scrollTop = document.getElementById('mensagens').scrollHeight;
        }
    </script>

</body>
</html>
