<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat de Atendimento</title>

    <!-- ✅ ORDEM OBRIGATÓRIA -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // ✅ SUAS CHAVES DO FIREBASE
        const firebaseConfig = {
          apiKey: "AIzaSyAsrFAwToc89j32XX0juvW7C7VYgpGcdiE",
          authDomain: "ambiente-de-teste-b966a.firebaseapp.com",
          databaseURL: "https://ambiente-de-teste-b966a-default-rtdb.firebaseio.com",
          projectId: "ambiente-de-teste-b966a",
          storageBucket: "ambiente-de-teste-b966a.firebasestorage.app",
          messagingSenderId: "878588656595",
          appId: "1:878588656595:web:46596b60a49e840f4a8d26"
        };

        const EMAIL_PERMITIDO = "williamempreiteiro007@gmail.com";

        // ✅ INICIALIZA ANTES DE TUDO
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const banco = firebase.database();
        let usuarioAtual = null;

        // ✅ MÉTODO QUE NÃO PRECISA DE DOMÍNIO LIBERADO (JANELINHA)
        function loginComGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            
            auth.signInWithPopup(provider)
            .then(result => {
                if (result.user.email === EMAIL_PERMITIDO) {
                    usuarioAtual = result.user;
                    salvarSessao();
                    alert("✅ LOGADO COM SUCESSO!");
                    fecharModal();
                } else {
                    auth.signOut();
                    alert("❌ E-mail não autorizado");
                }
            })
            .catch(erro => alert("🔴 ERRO: " + erro.message));
        }

        function salvarSessao() {
            localStorage.setItem('logado', 'sim');
            localStorage.setItem('email', EMAIL_PERMITIDO);
        }

        function verificarSeEstaLogado() {
            if (localStorage.getItem('logado') === 'sim') {
                usuarioAtual = { email: EMAIL_PERMITIDO };
                fecharModal();
                document.getElementById('botao-sair').style.display = 'block';
                banco.ref('mensagens/geral').on('value', carregarMensagens);
            } else {
                abrirModal();
            }
        }

        function deslogar() {
            auth.signOut().then(() => {
                localStorage.clear();
                usuarioAtual = null;
                location.reload();
            });
        }

        function abrirModal() { document.getElementById('modalLogin').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modalLogin').style.display = 'none'; }
    </script>

    <style>
        * {margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif;}
        body {background:#f5f5f5; padding-top:60px;}

        .cabecalho {
            position:fixed; top:0; left:0; right:0;
            height:60px; background:#7c3aed; color:white;
            display:flex; align-items:center; justify-content:space-between;
            padding:0 15px; z-index:999;
        }

        .modal-login {
            position:fixed; top:0; left:0; right:0; bottom:0;
            background:rgba(0,0,0,0.7);
            display:flex; align-items:center; justify-content:center;
            z-index:9999;
        }

        .modal-conteudo {
            background:white; padding:30px; border-radius:12px;
            width:90%; max-width:320px; text-align:center;
        }

        .botao-google {
            background:white; color:#333; border:1px solid #ddd;
            padding:12px; border-radius:8px; width:100%;
            display:flex; align-items:center; justify-content:center;
            gap:10px; margin:15px 0; cursor:pointer;
            font-size:15px; font-weight:500;
        }

        #mensagens {
            height:calc(100vh - 140px); overflow-y:auto;
            padding:15px; background:white; margin:10px;
            border-radius:8px;
        }

        .barra-entrada {
            position:fixed; bottom:15px; left:15px; right:15px;
            display:flex; gap:10px;
        }

        #texto_msg {
            flex:1; height:45px; border:2px solid #7c3aed;
            border-radius:25px; padding:0 20px; font-size:15px;
        }

        #botao-enviar {
            width:45px; height:45px; background:#dc2626; color:white;
            border:none; border-radius:50%; cursor:pointer;
        }

        .mensagem {
            margin:8px 0; padding:12px; border-radius:10px;
            max-width:80%;
        }
        .eu {background:#ede9fe; margin-left:auto; border-bottom-right-radius:0;}
        .outro {background:#f3f4f6; margin-right:auto; border-bottom-left-radius:0;}
    </style>
</head>
<body>

    <div class="cabecalho">
        <h3>Chat GitHub Pages</h3>
        <button id="botao-sair" onclick="deslogar()" style="display:none; background:white; color:#dc2626; border:none; padding:6px 12px; border-radius:6px;">Sair</button>
    </div>

    <div id="mensagens">
        <p class="text-center text-muted mt-5">👋 Faça login para começar</p>
    </div>

    <div class="barra-entrada">
        <input type="text" id="texto_msg" placeholder="Digite sua mensagem..." onkeydown="if(event.key==='Enter') enviar()">
        <button id="botao-enviar" onclick="enviar()"><i class="fa fa-paper-plane"></i></button>
    </div>

    <div id="modalLogin" class="modal-login">
        <div class="modal-conteudo">
            <h2 style="color:#7c3aed; margin-bottom:10px;">🔐 Acesso Autorizado</h2>
            <p style="color:#666; font-size:14px; margin-bottom:15px;">Apenas o e-mail cadastrado pode entrar</p>

            <button class="botao-google" onclick="loginComGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                Entrar com Google
            </button>
        </div>
    </div>

    <script>
        // ✅ AO CARREGAR A PÁGINA
        document.addEventListener('DOMContentLoaded', () => {
            verificarSeEstaLogado(); // Verifica se já está logado
        });

        function enviar() {
            if (!usuarioAtual) return abrirModal();
            const texto = document.getElementById('texto_msg').value.trim();
            if (!texto) return;

            const msg = {
                texto: texto,
                email: EMAIL_PERMITIDO,
                hora: new Date().toLocaleTimeString('pt-BR')
            };

            banco.ref('mensagens/geral').once('value', s => {
                const todas = s.val() || [];
                todas.push(msg);
                banco.ref('mensagens/geral').set(todas);
            });

            document.getElementById('texto_msg').value = '';
        }

        function carregarMensagens(snapshot) {
            const mensagens = snapshot.val() || [];
            let html = '';

            mensagens.forEach(m => {
                const classe = m.email === EMAIL_PERMITIDO ? 'eu' : 'outro';
                html += `
                <div class="mensagem ${classe}">
                    <div>${m.texto}</div>
                    <div style="font-size:11px; text-align:right; margin-top:5px; opacity:0.7;">${m.hora}</div>
                </div>`;
            });

            document.getElementById('mensagens').innerHTML = html;
            document.getElementById('mensagens').scrollTop = document.getElementById('mensagens').scrollHeight;
        }
    </script>

</body>
</html>
