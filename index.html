<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat GitHub Pages</title>

    <!-- ✅ CHAMANDO O ARQUIVO CONFIG.JS DE FORA → CERTO! -->
    <script src="config.js"></script>

    <!-- BIBLIOTECAS DO FIREBASE (versão 8.10.0 compatível) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // INICIALIZA O FIREBASE COM OS DADOS DO CONFIG.JS
        firebase.initializeApp(firebaseConfig);

        const EMAIL_PERMITIDO = "williamempreiteiro007@gmail.com";
        const auth = firebase.auth();
        const banco = firebase.database();
        let usuarioAtual = null;

        // LIMPA DADOS ANTIGOS
        localStorage.clear();

        // LOGAR COM GOOGLE
        function loginComGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            auth.signInWithRedirect(provider)
                .catch(erro => {
                    // ⚠️ AVISO DE ERRO NO LOGIN
                    alert("❌ Erro ao tentar logar: " + erro.message);
                    console.error("Detalhe do erro:", erro);
                });
        }

        // VERIFICA RETORNO DO LOGIN
        function verificarRetorno() {
            auth.getRedirectResult().then(result => {
                if (result.user) {
                    if (result.user.email.trim().toLowerCase() === EMAIL_PERMITIDO.trim().toLowerCase()) {
                        usuarioAtual = result.user;
                        document.getElementById("telaLogin").style.display = "none";
                        document.getElementById("telaChat").style.display = "block";
                        // ⚠️ ADICIONADO: MOSTRA ERRO SE PROIBIDO DE LER
                        banco.ref("mensagens/geral").on("value", carregarMensagens, erroPermissao);
                    } else {
                        auth.signOut();
                        alert("❌ E-MAIL NÃO PERMITIDO! USE SÓ A CONTA CADASTRADA.");
                        location.reload();
                    }
                }
            }).catch(erro => {
                // ⚠️ AVISO DE ERRO AO RETORNAR DO LOGIN
                alert("❌ Erro ao voltar do login: " + erro.message);
                console.error("Detalhe do erro:", erro);
            });
        }

        // ⚠️ FUNÇÃO NOVA: AVISA QUANDO TRAVAR POR CAUSA DAS REGRAS
        function erroPermissao(erro) {
            alert("🔒 PROBLEMA DE PERMISSÃO! \n\nMotivo: " + erro.message + "\n\nSolução: Verifique as Regras no Firebase, está faltando o .token ou o e-mail está errado lá!");
            console.error("Erro de permissão:", erro);
        }

        // VERIFICA SE JÁ ESTÁ LOGADO
        function verificarSessao() {
            auth.onAuthStateChanged(user => {
                if (user && user.email.trim().toLowerCase() === EMAIL_PERMITIDO.trim().toLowerCase()) {
                    usuarioAtual = user;
                    document.getElementById("telaLogin").style.display = "none";
                    document.getElementById("telaChat").style.display = "block";
                    // ⚠️ ADICIONADO: MOSTRA ERRO SE PROIBIDO DE LER
                    banco.ref("mensagens/geral").on("value", carregarMensagens, erroPermissao);
                } else {
                    usuarioAtual = null;
                    document.getElementById("telaLogin").style.display = "flex";
                    document.getElementById("telaChat").style.display = "none";
                }
            });
        }

        // SAIR DA CONTA
        function deslogar() {
            auth.signOut().then(() => {
                localStorage.clear();
                location.reload();
            }).catch(erro => {
                // ⚠️ AVISO DE ERRO AO SAIR
                alert("❌ Erro ao sair: " + erro.message);
                console.error("Detalhe do erro:", erro);
            });
        }
    </script>

    <style>
        * {margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif;}
        body {overflow:hidden; background:#fff;}

        /* TELA DE LOGIN */
        #telaLogin {
            position:fixed; top:0; left:0; width:100%; height:100%;
            display:flex; align-items:center; justify-content:center;
            background:#ffffff;
            z-index:999;
        }
        .caixa {
            text-align:center;
            padding:40px 30px;
            border-radius:12px;
            box-shadow:0 0 20px rgba(0,0,0,0.1);
        }
        .botao-g {
            border:1px solid #ddd;
            background:white;
            padding:14px 22px;
            border-radius:8px;
            display:flex; align-items:center; justify-content:center;
            gap:10px;
            width:260px;
            margin-top:20px;
            font-size:16px;
            cursor:pointer;
        }

        /* TELA DO CHAT */
        #telaChat {
            display:none;
            width:100vw; height:100vh;
            background:#f5f5f5;
            position:relative;
        }
        .cab {
            height:60px; background:#6f42c1; color:white;
            display:flex; align-items:center; justify-content:space-between;
            padding:0 18px;
        }
        #msgs {
            height:calc(100vh - 120px);
            overflow-y:auto;
            padding:16px;
        }
        .envio {
            position:absolute; bottom:0; left:0; right:0;
            height:60px; background:white;
            display:flex; align-items:center;
            padding:0 15px;
            border-top:1px solid #ddd;
        }
        #txt {
            flex:1; height:42px; border:1px solid #6f42c1;
            border-radius:21px; padding:0 18px;
            font-size:15px; margin-right:10px;
        }
        #btn {
            width:42px; height:42px; background:#dc3545;
            color:white; border:none; border-radius:50%;
            font-size:18px; cursor:pointer;
        }
        .msg {
            margin:7px 0; padding:12px 15px;
            border-radius:10px; max-width:75%;
        }
        .eu {background:#ede9fe; margin-left:auto; border-bottom-right-radius:0;}
        .outro {background:#e9ecef; margin-right:auto; border-bottom-left-radius:0;}
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div id="telaLogin">
        <div class="caixa">
            <h1 style="color:#6f42c1; font-size:22px;">🔐 Acesso Autorizado</h1>
            <p style="color:#666; margin-top:10px;">Apenas o e-mail cadastrado pode entrar</p>
            <button class="botao-g" onclick="loginComGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22">
                Entrar com Google
            </button>
        </div>
    </div>

    <!-- TELA DO CHAT -->
    <div id="telaChat">
        <div class="cab">
            <h2 style="font-size:17px;">Chat GitHub Pages</h2>
            <button onclick="deslogar()" style="background:white; color:#dc3545; border:none; padding:6px 12px; border-radius:6px;">Sair</button>
        </div>
        <div id="msgs"></div>
        <div class="envio">
            <input id="txt" type="text" placeholder="Digite sua mensagem..." onkeydown="if(event.key==='Enter') enviar()">
            <button id="btn" onclick="enviar()">➡️</button>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            verificarRetorno();
            verificarSessao();
        });

        // ENVIAR MENSAGEM
        function enviar() {
            const texto = document.getElementById("txt").value.trim();
            if (!texto || !usuarioAtual) return;

            const msg = {
                texto: texto,
                de: EMAIL_PERMITIDO,
                hora: new Date().toLocaleTimeString("pt-BR", {hour:"2-digit", minute:"2-digit"})
            };

            banco.ref("mensagens/geral").once("value", s => {
                let todas = s.val() || [];
                todas.push(msg);
                banco.ref("mensagens/geral").set(todas)
                    .catch(erro => {
                        // ⚠️ AVISO DE ERRO AO ENVIAR (TRAVOU POR REGRA)
                        alert("❌ NÃO CONSEGUIU ENVIAR!\n\nMotivo: " + erro.message + "\n\nIsso é problema nas Regras do Firebase, falta o .token!");
                        console.error("Erro ao escrever:", erro);
                    });
            });

            document.getElementById("txt").value = "";
        }

        // CARREGAR MENSAGENS NA TELA
        function carregarMensagens(snap) {
            const dados = snap.val() || [];
            let html = "";
            dados.forEach(m => {
                let classe = m.de === EMAIL_PERMITIDO ? "eu" : "outro";
                html += `<div class="msg ${classe}">${m.texto}<div style="font-size:11px; opacity:0.7; margin-top:4px;">${m.hora}</div></div>`;
            });
            document.getElementById("msgs").innerHTML = html;
            document.getElementById("msgs").scrollTop = document.getElementById("msgs").scrollHeight;
        }
    </script>

</body>
</html>
