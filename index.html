<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat de Atendimento</title>

    <!-- ✅ ORDEM OBRIGATÓRIA -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="config.js"></script>

    <script>
        // ✅ INICIALIZAÇÃO ESPECIAL PARA GITHUB
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const banco = firebase.database();
        let usuarioAtual = null;

        // ✅ MÉTODO QUE SÓ FUNCIONA NO SEU SITE (NÃO DÁ ERRO)
        function loginComGoogle() {
            // Força usar o domínio correto
            auth.useDeviceLanguage();
            auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({
                prompt: 'select_account',
                hd: 'gmail.com'
            });

            // ✅ USA REDIRECIONAMENTO COM DOMÍNIO LIBERADO
            auth.signInWithRedirect(provider);
        }

        // ✅ VERIFICAÇÃO DE RETORNO DO GITHUB
        function verificarLogin() {
            auth.getRedirectResult()
            .then(result => {
                if (result.user) {
                    if (result.user.email === EMAIL_PERMITIDO) {
                        usuarioAtual = result.user;
                        salvarSessao();
                        alert("✅ LOGADO COM SUCESSO NO GITHUB PAGES!");
                        window.location.href = DOMINIO_AUTORIZADO + "/web777-ctrl/";
                    } else {
                        auth.signOut();
                        alert("❌ E-mail não é o autorizado");
                    }
                }
            })
            .catch(erro => {
                // ✅ MOSTRA O ERRO REAL QUE TAVA ESCONDIDO
                alert("🔴 ERRO DETECTADO: " + erro.code + "\n\n" + erro.message);
                console.error("ERRO COMPLETO:", erro);
            });
        }

        function salvarSessao() {
            localStorage.setItem('sessao_autorizada', 'true');
            localStorage.setItem('email_usuario', EMAIL_PERMITIDO);
        }

        function verificarSessao() {
            if (localStorage.getItem('sessao_autorizada') === 'true') {
                usuarioAtual = { email: EMAIL_PERMITIDO };
                entrarSistema();
            }
        }

        function entrarSistema() {
            document.getElementById('modalLogin').style.display = 'none';
            document.getElementById('avisoVitoria').style.display = 'block';
            document.getElementById('botao-sair').style.display = 'block';
            banco.ref('mensagens/geral').on('value', carregarMensagens);
        }

        function deslogar() {
            auth.signOut().then(() => {
                localStorage.clear();
                usuarioAtual = null;
                location.reload();
            });
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background: #f8f9fa; padding-top: 60px; }

        .aviso-vitoria {
            background: #28a745;
            color: white;
            padding: 12px;
            text-align: center;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 9999;
            font-weight: bold;
        }

        .cabecalho {
            position: fixed;
            top: 40px; left: 0; right: 0;
            height: 60px;
            background: #6f42c1;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 999;
        }

        .modal-login {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
        }

        .modal-conteudo {
            background: white;
            padding: 30px;
            border-radius:  12px;
            width: 90%;
            max-width: 300px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        .botao-google {
            background: white;
            color: #333;
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .botao-google:hover {
            background: #f8f9fa;
            border-color: #ccc;
        }

        #mensagens {
            height: calc(100vh - 180px);
            overflow-y: auto;
            padding: 15px;
            margin-top: 40px;
            background: white;
            border-radius: 8px;
            margin: 10px;
        }

        .barra-entrada {
            position: fixed;
            bottom: 15px; left: 15px; right: 15px;
            display: flex;
            gap: 10px;
        }

        #texto_msg {
            flex: 1;
            height: 45px;
            border: 2px solid #6f42c1;
            border-radius: 25px;
            padding: 0 20px;
            font-size: 15px;
        }

        #botao-enviar {
            width: 45px;
            height: 45px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
        }

        .mensagem {
            margin: 8px 0;
            padding: 12px;
            border-radius: 10px;
            max-width: 80%;
        }

        .mensagem-propria {
            background: #e9ecef;
            margin-left: auto;
            border-bottom-right-radius: 0;
        }

        .mensagem-outra {
            background: #d1e7dd;
            margin-right: auto;
            border-bottom-left-radius: 0;
        }
    </style>
</head>
<body>

    <div id="avisoVitoria" class="aviso-vitoria" style="display: none;">
        ✅ CONECTADO NO GITHUB PAGES - TUDO FUNCIONANDO! 🚀
    </div>

    <div class="cabecalho">
        <button onclick="history.back()" style="background:#dc3545; color:white; border:none; padding:6px 12px; border-radius:6px;">
            <i class="fa fa-arrow-left"></i> Voltar
        </button>
        <h3>Chat GitHub Pages</h3>
        <button id="botao-sair" onclick="deslogar()" style="display:none; background:white; color:#dc3545; border:none; padding:6px 12px; border-radius:6px;">
            <i class="fa fa-sign-out"></i> Sair
        </button>
    </div>

    <div id="mensagens">
        <p class="text-center text-muted mt-5">👋 Bem-vindo! Faça login para começar</p>
    </div>

    <div class="barra-entrada">
        <input type="text" id="texto_msg" placeholder="Digite sua mensagem..." onkeydown="if(event.key==='Enter') enviar()">
        <button id="botao-enviar" onclick="enviar()"><i class="fa fa-paper-plane"></i></button>
    </div>

    <div id="modalLogin" class="modal-login">
        <div class="modal-conteudo">
            <h2 class="text-purple-700 mb-3">🔐 Acesso Autorizado</h2>
            <p class="text-muted mb-4">Apenas o e-mail cadastrado pode entrar</p>

            <!-- ✅ BOTÃO CONFIGURADO SÓ PARA SEU SITE -->
            <button class="botao-google" onclick="loginComGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                Entrar com Google
            </button>

            <p class="text-xs text-muted mt-3">Domínio: web777-ctrl.github.io</p>
        </div>
    </div>

    <script>
        // ✅ VERIFICAÇÃO AUTOMÁTICA AO CARREGAR
        document.addEventListener('DOMContentLoaded', () => {
            verificarLogin(); // Verifica se voltou do Google
            verificarSessao(); // Verifica se já está logado
        });

        function enviar() {
            if (!usuarioAtual) return alert("⚠️ Faça login primeiro!");
            const texto = document.getElementById('texto_msg').value.trim();
            if (!texto) return;

            const mensagem = {
                texto: texto,
                remetente: EMAIL_PERMITIDO,
                hora: new Date().toLocaleTimeString('pt-BR')
            };

            banco.ref('mensagens/geral').once('value', s => {
                const todas = s.val() || [];
                todas.push(mensagem);
                banco.ref('mensagens/geral').set(todas);
            });

            document.getElementById('texto_msg').value = '';
        }

        function carregarMensagens(snapshot) {
            const dados = snapshot.val() || [];
            let html = '';

            dados.forEach(msg => {
                const classe = msg.remetente === EMAIL_PERMITIDO ? 'mensagem-propria' : 'mensagem-outra';
                html += `
                <div class="mensagem ${classe}">
                    <div>${msg.texto}</div>
                    <div class="text-xs text-muted text-right mt-1">${msg.hora}</div>
                </div>`;
            });

            document.getElementById('mensagens').innerHTML = html || '<p class="text-center text-muted">Nenhuma mensagem ainda</p>';
            document.getElementById('mensagens').scrollTop = document.getElementById('mensagens').scrollHeight;
        }
    </script>

</body>
</html>
