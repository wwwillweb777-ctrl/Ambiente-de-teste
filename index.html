    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #000; color: #fff; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
        .cabecalho-nosso { background: url('https://i.postimg.cc/N0pFG0Zx/IMG-20260522-055852.webp') center/cover no-repeat; height: 180px; width: 100%; position: fixed; top: 0; left: 0; z-index: 50; display: flex; align-items: center; padding-left: 1rem; }
        
        .tela-login-google { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
        .botao-google-grande { display: flex; align-items: center; gap: 10px; background: #ffffff; color: #000000; padding: 14px 28px; border-radius: 6px; font-size: 17px; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; }
        .botao-google-grande img { width: 24px; height: 24px; }
        .botao-google-grande:active { transform: scale(0.97); }
        .aviso-erro { color: #ff6b6b; font-size: 14px; display: none; }

        #menuLateral { position: fixed; top: 0; left: 0; height: 100%; width: 80%; background: rgba(30, 64, 175, 0.85); transform: translateX(-100%); transition: 0.2s; z-index: 60; padding: 20px; }
        #menuLateral.aberto { transform: translateX(0); }
        .fundo-menu { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 55; display: none; }
        nav a { display: block; padding: 12px; margin: 6px 0; color: #fff; text-align: center; border-radius: 6px; text-decoration: none; }
        nav a:hover { background: rgba(255,255,255,0.15); }
        .conteudo { padding-top: 200px; padding-bottom: 40px; }
        .card-produto { background: #000; margin-bottom: 16px; padding: 12px; border-radius: 8px; }
        .moldura-produto { width: 100%; aspect-ratio: 1/1.4; background: #fff; border-radius: 8px; overflow: hidden; }
        .img-produto { width: 100%; height: 100%; object-fit: contain; }
        .btn-adicionar { background: #2563eb; color: #fff; border: none; padding: 7px 14px; border-radius: 6px; margin-top: 8px; cursor: pointer; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 70; padding: 20px; }
        .modal-conteudo { background: #1f2937; max-width: 500px; margin: 5% auto; padding: 20px; border-radius: 8px; }
        .fechar { color: #fff; float: right; font-size: 24px; cursor: pointer; }
        input, select { width: 100%; padding: 8px; margin: 6px 0; background: #374151; border: 1px solid #4b5563; color: #fff; border-radius: 4px; }
        .btn-enviar { width: 100%; background: #2563eb; color: #fff; border: none; padding: 10px; border-radius: 4px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="telaGoogle" class="tela-login-google">
    <h2 style="color:#facc15; font-size:20px;">Acesso Restrito</h2>
    <button id="btnGoogleEntrar" class="botao-google-grande">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Entrar com Google
    </button>
    <p id="erroLogin" class="aviso-erro">Acesso não permitido!</p>
</div>

<header class="cabecalho-nosso">
    <button onclick="abrirMenu()" style="color:#fff; font-size:22px; border:none; background:none;">
        <i class="fa fa-bars"></i>
    </button>
</header>

<div id="menuLateral">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3 style="color:#facc15; font-size:19px;">Menu</h3>
        <button onclick="fecharMenu()" style="color:#fff; font-size:20px; border:none; background:none;">
            <i class="fa fa-times"></i>
        </button>
    </div>
    <nav>
        <a href="index.html">🏠 Loja da Val</a>
        <a href="#pedidos">📋 Meus Pedidos</a>
        <a onclick="verificarSenha('atendente.html')">🔐 Caixa Registradora</a>
        <a onclick="verificarSenha('admin.html')">🔐 Administração</a>
    </nav>
</div>
<div id="fundoMenu" class="fundo-menu" onclick="fecharMenu()"></div>

<div class="conteudo container">
    <div id="lista-produtos"></div>

    <div style="background:rgba(255,255,255,0.05); padding:16px; border-radius:10px; margin:20px 0;">
        <h3 style="color:#facc15; margin-bottom:10px;">🛒 Seu Pedido</h3>
        <div id="carrinho-itens"></div>
        <div style="text-align:right; margin:10px 0;">Total: R$ <span id="carrinho-total">0,00</span></div>
        <button onclick="abrirForm()" style="width:100%; background:#2563eb; color:#fff; border:none; padding:10px; border-radius:6px;">Finalizar Pedido</button>
    </div>

    <div id="pedidos" style="background:rgba(255,255,255,0.05); padding:16px; border-radius:10px;">
        <h3 style="color:#facc15; margin-bottom:10px;">📋 Meus Pedidos</h3>
        <div id="lista-meus-pedidos"></div>
    </div>
</div>

<div id="formModal" class="modal">
    <div class="modal-conteudo">
        <span class="fechar" onclick="fecharForm()">&times;</span>
        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="text" id="cidade" placeholder="Cidade">
        <input type="text" id="rua" placeholder="Rua / Avenida">
        <input type="text" id="numero" placeholder="Número">
        <input type="text" id="bairro" placeholder="Bairro">
        <select id="tipo">
            <option value="">Tipo de Residência</option>
            <option>Casa</option>
            <option>Apartamento</option>
        </select>
        <input type="text" id="referencia" placeholder="Ponto de Referência">
        <input type="tel" id="whatsapp" placeholder="WhatsApp">
        <button id="btnEnviar" class="btn-enviar">Enviar Pedido</button>
    </div>
</div>

<script>
const LINK1 = "https://i.postimg.cc/wMvzBm3D/IMG-20260517-WA0025.webp";
const LINK2 = "https://i.postimg.cc/rs5Q48sf/IMG-20260517-WA0026-(1).jpg";
const LINK3 = "https://i.postimg.cc/hPLM2PsD/IMG-20260517-WA0030-(2).webp";
const LINK4 = "https://i.postimg.cc/VkLf6vHf/IMG-20260517-WA0027-(1).webp";
const LINK5 = "https://i.postimg.cc/dtz3VrTQ/IMG-20260517-WA0029-(1).webp";
const LINK6 = "https://i.postimg.cc/yYz9LML8/IMG-20260517-WA0031-2-(2).webp";
const LINK7 = "https://i.postimg.cc/RVRkhz8W/IMG-20260517-WA0032-(1).webp";

const SENHA_ATENDENTE = "Deus321";
const SENHA_ADMIN = "WJ@321";
const NUMERO_WPP = "5531990721928";

let db, auth, provedorGoogle;
let destinoPagina = "";

document.addEventListener('DOMContentLoaded', () => {
    // ✅ AGORA NÃO TEM MAIS ERRO, OS DADOS ESTÃO LÁ EM CIMA IGUAL VOCÊ PASSOU
    if (!firebase.apps.length) {
        firebase.initializeApp(CONFIG_FIREBASE);
    }
    
    db = firebase.database();
    auth = firebase.auth();
    provedorGoogle = new firebase.auth.GoogleAuthProvider();
    provedorGoogle.setCustomParameters({ prompt: 'select_account' });

    const botaoLogin = document.getElementById('btnGoogleEntrar');
    botaoLogin.addEventListener('click', () => {
        document.getElementById('erroLogin').style.display = 'none';

        auth.signInWithPopup(provedorGoogle)
        .then(resultado => {
            const emailUsuario = resultado.user.email.trim().toLowerCase();
            const emailAdminConf = EMAIL_ADMIN.trim().toLowerCase();
            const emailAtendenteConf = EMAIL_ATENDENTE.trim().toLowerCase();
            let liberado = false;

            if (destinoPagina === 'admin.html' && emailUsuario === emailAdminConf) {
                liberado = true;
            }
            if (destinoPagina === 'atendente.html' && emailUsuario === emailAtendenteConf) {
                liberado = true;
            }

            if (liberado) {
                localStorage.setItem('dadosAcesso', JSON.stringify({
                    pagina: destinoPagina,
                    email: emailUsuario,
                    logado: true
                }));
                window.location.href = destinoPagina;
            } else {
                document.getElementById('erroLogin').style.display = 'block';
                auth.signOut();
            }
        })
        .catch(() => {
            document.getElementById('erroLogin').style.display = 'block';
        });
    });

    carregarProdutos();
    atualizarCarrinho();
    carregarPedidos();
});

function abrirMenu() { document.getElementById('menuLateral').classList.add('aberto'); document.getElementById('fundoMenu').style.display = 'block'; }
function fecharMenu() { document.getElementById('menuLateral').classList.remove('aberto'); document.getElementById('fundoMenu').style.display = 'none'; }

function verificarSenha(pagina) {
    const senha = prompt("");
    fecharMenu();
    if (!senha) return;

    if ((pagina === 'atendente.html' && senha === SENHA_ATENDENTE) || (pagina === 'admin.html' && senha === SENHA_ADMIN)) {
        destinoPagina = pagina;
        document.getElementById('telaGoogle').style.display = 'flex';
    }
}

function abrirForm() {
    const carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
    if (carrinho.length === 0) return;
    document.getElementById('formModal').style.display = 'block';
}
function fecharForm() { document.getElementById('formModal').style.display = 'none'; }

document.getElementById('btnEnviar').addEventListener('click', async () => {
    const dados = {
        nome: document.getElementById('nome').value.trim(),
        cidade: document.getElementById('cidade').value.trim(),
        rua: document.getElementById('rua').value.trim(),
        numero: document.getElementById('numero').value.trim(),
        bairro: document.getElementById('bairro').value.trim(),
        tipo: document.getElementById('tipo').value,
        referencia: document.getElementById('referencia').value.trim(),
        whatsapp: document.getElementById('whatsapp').value.trim()
    };

    if (!dados.nome || !dados.cidade || !dados.rua || !dados.numero || !dados.bairro || !dados.tipo) return;

    const carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
    const total = carrinho.reduce((s,i) => s + (i.preco * i.quantidade), 0);
    const codigo = localStorage.getItem('codCliente') || (Math.random().toString(36).substr(2,12).toUpperCase());
    localStorage.setItem('codCliente', codigo);

    await db.ref('pedidos').push({
        data: new Date().toLocaleString('pt-BR'),
        itens: carrinho,
        total: total,
        cliente: dados,
        codigoCliente: codigo,
        status: 'Pendente'
    });

    window.open(`https://wa.me/${NUMERO_WPP}?text=${encodeURIComponent('Novo pedido realizado')}`, '_blank');
    localStorage.removeItem('carrinho');
    atualizarCarrinho();
    fecharForm();
});

async function carregarProdutos() {
    const el = document.getElementById('lista-produtos');
    const todos = await db.ref('produtos').once('value').then(s => s.val() || {});
    const ativos = Object.entries(todos).filter(([_,p]) => p.disponivel);

    let html = '';
    ativos.forEach(([id,p], i) => {
        const img = eval(`LINK${i+1}`) || '';
        html += `
        <div class="card-produto">
            <div class="moldura-produto"><img src="${img}" alt="${p.nome}" class="img-produto"></div>
            <div style="padding:8px 0;">
                <div style="font-weight:bold;">R$ ${p.preco.toFixed(2)}</div>
                <div>${p.nome}</div>
                <button class="btn-adicionar" onclick="adicionar('${id}', '${p.nome.replace(/'/g,"\\'")}', ${p.preco})">+ Adicionar</button>
            </div>
        </div>`;
    });
    el.innerHTML = html;
}

function adicionar(id, nome, preco) {
    const carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
    const item = carrinho.find(i => i.id === id);
    item ? item.quantidade++ : carrinho.push({id,nome,preco,quantidade:1});
    localStorage.setItem('carrinho', JSON.stringify(carrinho));
    atualizarCarrinho();
}

function atualizarCarrinho() {
    const carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
    const el = document.getElementById('carrinho-itens');
    const totalEl = document.getElementById('carrinho-total');
    if (carrinho.length === 0) { el.innerHTML = ''; totalEl.innerText = '0,00'; return; }

    let html = '';
    let total = 0;
    carrinho.forEach(i => {
        total += i.preco * i.quantidade;
        html += `<div style="display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #333;">
            <span>${i.nome} (${i.quantidade})</span>
            <span>R$ ${(i.preco * i.quantidade).toFixed(2)}</span>
        </div>`;
    });
    el.innerHTML = html;
    totalEl.innerText = total.toFixed(2);
}

async function carregarPedidos() {
    const el = document.getElementById('lista-meus-pedidos');
    const codigo = localStorage.getItem('codCliente');
    if (!codigo) return;

    const todos = await db.ref('pedidos').once('value').then(s => s.val() || {});
    const meus = Object.entries(todos).filter(([_,p]) => p.codigoCliente === codigo && p.status !== 'Entregue');

    let html = '';
    meus.forEach(([id,p]) => {
        html += `<div style="padding:8px 0; border-bottom:1px solid #333;">
            <div style="font-weight:bold;">Pedido #${id.substr(-4)}</div>
            <div>Status: ${p.status}</div>
            <div>Total: R$ ${p.total.toFixed(2)}</div>
        </div>`;
    });
    el.innerHTML = html;
}
</script>
</body>
</html>
