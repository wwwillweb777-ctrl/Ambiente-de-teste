<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito</title>
    <script src="config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { dourado: '#FFD700', escuro: '#000000', cinzaescuro: '#1a1a1a', azulbotao: '#2563eb' },
                    fontFamily: { poppins: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #000; color: #e6e6e6; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1rem; }
        .card { background:#111; border:1px solid #222; border-radius:20px; padding:2rem; width:100%; max-width:400px; box-shadow:0 10px 25px rgba(0,0,0,0.5); }
        .btn { width:100%; padding:0.9rem; border-radius:10px; font-weight:600; border:none; cursor:pointer; transition:0.2s; font-size:1rem; margin:0.5rem 0; }
        .btn-google { background:#fff; color:#333; display:flex; align-items:center; justify-content:center; gap:0.5rem; }
        .btn-google:hover { background:#f1f1f1; }
        .btn-azul { background:#2563eb; color:white; }
        .btn-azul:hover { background:#1d4ed8; }
        .btn-cinza { background:#374151; color:white; }
        input { width:100%; padding:0.9rem; background:#222; border:1px solid #333; border-radius:8px; color:white; margin:0.5rem 0; }
    </style>
</head>
<body>

    <div class="card">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-dourado mb-2">🔐 Acesso Restrito</h1>
            <p class="text-gray-400 text-sm">Faça login com sua conta autorizada</p>
        </div>

        <!-- ✅ BOTÃO PRINCIPAL: LOGAR COM CONTA GOOGLE -->
        <button id="loginGoogle" class="btn btn-google">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.12 0 5.93 1.08 8.17 2.87l6.1-6.1C34.58 3.25 29.53 1 24 1 14.73 1 6.66 6.2 2.54 14.06l6.97 5.43C11.31 13.18 17.12 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.55-.14-3.05-.4-4.5H24v9h12.73c-.57 2.85-2.23 5.26-4.72 6.88l7.24 5.63c4.22-3.89 6.65-9.62 6.65-16.01z"/><path fill="#FBBC05" d="M9.51 28.49c-1.14-3.38-1.14-7.02 0-10.4L2.54 13.06C.92 16.82 0 20.86 0 25s.92 8.18 2.54 11.94l6.97-5.45z"/><path fill="#34A853" d="M24 47c5.43 0 10.48-1.78 14.34-4.84l-7.24-5.63c-2.01 1.35-4.58 2.15-7.1 2.15-6.86 0-12.67-3.68-15.49-9.11l-6.97 5.43C6.66 41.8 14.73 47 24 47z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
            Entrar com Google
        </button>

        <div class="relative text-center my-4"><span class="bg-[#111] px-2 text-gray-500 text-sm">ou use senha</span><div class="absolute left-0 top-1/2 w-full border-t border-gray-700 -z-10"></div></div>

        <input type="email" id="email" placeholder="seuemail@gmail.com">
        <input type="password" id="senha" placeholder="Digite a senha">
        <button id="loginSenha" class="btn btn-azul">Entrar</button>

        <a href="index.html"><button class="btn btn-cinza">Voltar para Loja</button></a>
    </div>

    <script>
        // === INICIALIZA O SISTEMA DE LOGIN USANDO AS CONFIGURAÇÕES DO config.js ===
        if (!firebase.apps.length) firebase.initializeApp(CONFIG_FIREBASE);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // === PEGA PARA QUAL ÁREA O USUÁRIO QUER ENTRAR ===
        const urlParams = new URLSearchParams(window.location.search);
        const destino = urlParams.get('destino'); // 'atendente' ou 'admin'

        // === FUNÇÃO: LOGAR COM CONTA GOOGLE ===
        document.getElementById('loginGoogle').addEventListener('click', () => {
            auth.signInWithPopup(provider)
            .then(result => verificarAcesso(result.user.email)) 
            .catch(erro => alert('Erro ao entrar: ' + erro.message));
        });

        // === FUNÇÃO: LOGAR COM EMAIL E SENHA (SE PRECISAR) ===
        document.getElementById('loginSenha').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            auth.signInWithEmailAndPassword(email, senha)
            .then(result => verificarAcesso(result.user.email))
            .catch(erro => alert('Erro: ' + erro.message));
        });

        // === FUNÇÃO PRINCIPAL: VERIFICA SE O EMAIL TEM PERMISSÃO ===
        function verificarAcesso(emailUsuario) {
            // Deixa tudo minúsculo para evitar erro de letra maiúscula/minúscula
            emailUsuario = emailUsuario.toLowerCase().trim();
            
            // ✅ USA AS FUNÇÕES QUE VOCÊ DEFINIU NO config.js
            if (verificarPermissao(emailUsuario)) {
                let nivel = getNivelAcesso(emailUsuario);
                let pagina;

                // ✅ VAI PARA OS NOMES CORRETOS DAS PÁGINAS QUE VOCÊ PEDIU
                if (nivel === "admin") {
                    pagina = "admin.html";  // NOME CORRETO
                } else if (nivel === "atendente") {
                    pagina = "atendente.html"; // NOME CORRETO
                } else {
                    pagina = "index.html";
                }

                alert('✅ Acesso liberado! Bem-vindo(a) ' + emailUsuario);
                window.location.href = pagina; 
            } else {
                // ❌ SE NÃO TIVER PERMISSÃO → BLOQUEIA E VOLTA
                alert('❌ Acesso negado! Este e-mail não tem permissão para esta área.');
                auth.signOut(); // DESLOGA POR SEGURANÇA
                window.location.href = 'index.html'; // VOLTA PARA LOJA
            }
        }

        // === SE JÁ ESTIVER LOGADO, VERIFICA AUTOMATICAMENTE ===
        auth.onAuthStateChanged(user => {
            if (user) verificarAcesso(user.email);
        });
    </script>
</body>
</html>
